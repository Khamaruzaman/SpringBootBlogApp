# Production MongoDB connection with authentication
# When running in Docker, MongoDB is accessible at "mongodb" hostname
spring.mongodb.host=${SPRING_MONGODB_HOST:mongodb}
spring.mongodb.port=${SPRING_MONGODB_PORT:27017}
spring.mongodb.database=${SPRING_MONGODB_DATABASE:BlogApp}
spring.mongodb.username=${SPRING_MONGODB_USERNAME:admin}
spring.mongodb.password=${SPRING_MONGODB_PASSWORD:password}
spring.mongodb.authentication-database=${SPRING_MONGODB_AUTHENTICATION_DATABASE:admin}

# JWT configuration
jwt.secret=${JWT_SECRET:910dc2bf2731d4656a72ef0b3d79ee157bb08a0859805a5b6a5044fd631bec1f}
jwt.expirationMs=${JWT_EXPIRATION_MS:3600000}

# Logging
logging.level.org.springframework=INFO
logging.level.com.example=INFO

